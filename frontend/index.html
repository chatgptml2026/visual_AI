<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accessible Navigation</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { background:black; color:white; text-align:center; }
#map { height:400px; }
button { font-size:18px; margin:10px; padding:10px; }
</style>
</head>

<body>

<h2>Accessible Navigation</h2>

<button onclick="startListening()">🎤 Destination</button>
<button onclick="startNavigation()">▶ Start</button>

<div id="map"></div>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas" style="display:none;"></canvas>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<script src="app.js"></script>
</body>
</html>
